<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест форм</title>
</head>
<body>
    <h1>Тест отправки формы</h1>

    <form id="testForm">
        <input type="text" name="test_field" value="test_value" placeholder="Тестовое поле">
        <button type="submit">Отправить</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Форма отправлена');

            const formData = new FormData(e.target);

            try {
                const response = await fetch('server/news_save.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.text();
                console.log('Ответ:', result);
                document.getElementById('result').textContent = 'Ответ сервера: ' + result;
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('result').textContent = 'Ошибка: ' + error.message;
            }
        });
    </script>
</body>
</html>
