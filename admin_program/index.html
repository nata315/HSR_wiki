<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Panel</title>

        <link rel="stylesheet" href="admin_style.css">
        <script src="admin_script.js" defer></script>
    </head>

    <body>

        <header class="header" id="mainHeader">

        <div class="header-left-text">
        <h1>Админ-панель</h1>
        </div>

        <div class="header-center-userBadge hidden" id="userBadge">
        <svg width="30" height="30" viewBox="0 0 32 32">
        <path d="M16 15.503A5.041 5.041 0 1 0 16 5.42a5.041 5.041 0 0 0 0 10.083zm0 2.215c-6.703 0-11 3.699-11 5.5v3.363h22v-3.363c0-2.178-4.068-5.5-11-5.5z"/>
        </svg>

        <input type="text" readonly id="adminName">
        </div>

        <button class="btn-exit hidden" id="exitButton">Выход</button>

        </header>


        <main>

        <!-- LOGIN PAGE -->

        <section id="loginPage" class="page active">

        <form class="confirmationForm">

        <div class="form-group">
        <label>Введите логин</label>
        <input type="text" id="login" required>
        </div>

        <div class="form-group password">

        <label>Введите пароль</label>
        <input type="password" id="password" placeholder="5 символов" required>

        <button type="button" class="toggle-password"></button>

        </div>

        <button class="btn-submit" type="button" data-page="welcome">
        Подтвердить
        </button>

        </form>

        </section>


        <!-- WELCOME PAGE -->

        <section id="welcomePage" class="page">

        <div class="pageHello">

        <p>
        Добро пожаловать,
        <span id="adminNameText">Администратор</span>
        </p>

        <button class="btn-start" data-page="news">
        Начать работу
        </button>

        <button class="btn-exit" data-page="login">
        Выйти
        </button>

        </div>

        </section>


        <!-- ADMIN LAYOUT -->

        <section id="adminContainer" class="admin-layout hidden">

        <!-- SIDEBAR (ОДИН НА ВСЕ СТРАНИЦЫ) -->

        <aside class="sidebar">

        <button class="sidebar-btn" data-page="news">Новости</button>

        <button class="sidebar-btn" data-page="characters">Персонажи</button>

        <button class="sidebar-btn" data-page="teams">Отряды</button>

        <button class="sidebar-btn" data-page="planets">Планеты</button>

        </aside>


        <!-- MAIN CONTENT -->

        <div class="content-area" id="contentArea">

        <!-- Контент подгружается JS -->

        </div>

        </section>


        <!-- EDIT FORMS -->

        <section id="editNewsPage" class="page">

        <div class="content-header">
        <h2>Редактирование новости</h2>
        <button data-page="news">Назад</button>
        </div>

        <form class="card-form">

        <label>Заголовок</label>
        <input type="text">

        <label>Описание</label>
        <textarea rows="4"></textarea>

        <label>Дата</label>
        <input type="date">

        <label>Фото</label>
        <input type="url">

        <div class="button-group">
        <button class="btn-save-add">Сохранить</button>
        <button class="btn-delete">Удалить</button>
        </div>

        </form>

        </section>


        <section id="editCharacterPage" class="page">

        <div class="content-header">
        <h2>Редактирование персонажа</h2>
        <button data-page="characters">Назад</button>
        </div>

        <form class="card-form">

        <label>Имя</label>
        <input type="text">

        <label>Описание</label>
        <textarea rows="4"></textarea>

        <label>Оружие</label>
        <input type="text">

        <label>Фото</label>
        <input type="url">

        <div class="button-group">
        <button class="btn-save-add">Сохранить</button>
        <button class="btn-delete">Удалить</button>
        </div>

        </form>

        </section>


        <section id="editTeamPage" class="page">

        <div class="content-header">
        <h2>Редактирование отряда</h2>
        <button data-page="teams">Назад</button>
        </div>

        <form class="card-form">

        <label>Изображение 1</label>
        <input type="url">

        <label>Изображение 2</label>
        <input type="url">

        <label>Изображение 3</label>
        <input type="url">

        <label>Описание</label>
        <textarea rows="4"></textarea>

        <div class="button-group">
        <button class="btn-save-add">Сохранить</button>
        <button class="btn-delete">Удалить</button>
        </div>

        </form>

        </section>


        <section id="editPlanetPage" class="page">

        <div class="content-header">
        <h2>Редактирование планеты</h2>
        <button data-page="planets">Назад</button>
        </div>

        <form class="card-form">

        <label>Название</label>
        <input type="text">

        <label>Фото</label>
        <input type="url">

        <label>Описание</label>
        <textarea rows="4"></textarea>

        <div class="button-group">
        <button class="btn-save-add">Сохранить</button>
        <button class="btn-delete">Удалить</button>
        </div>

        </form>

        </section>


        <!-- DELETE MODAL -->

        <div id="deleteConfirmModal" class="modal-overlay hidden">

        <div class="modal-window delete-confirm-window">

        <p>Вы уверены, что хотите удалить это?</p>

        <div class="confirm-buttons">
        <button id="confirmDeleteBtn">Да</button>
        <button id="cancelDeleteBtn">Нет</button>
        </div>

        </div>

        </div>

        </main>

    </body>
</html>
