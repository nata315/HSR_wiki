<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
        <div class="header-left">
                <img id="logo" src="https://www.pngall.com/wp-content/uploads/17/Honkai-Star-Rail-Logo-Iconic-Design-PNG.png" alt="Логотип">
        </div>
        <div class="header-right">
            <h2>Магазин</h2>
        </div>
        <div></div>
    </header>  

    <div class="shopCart">
        <label for="category">Выбор категории:</label>
        <select id="category">
            <option value="all">Все</option>
            <option value="electronics">Электроника</option>
            <option value="jewelery">Украшения</option>
            <option value="men's clothing">Мужская одежда</option>
            <option value="women's clothing">Женская одежда</option>
        </select>
        
        <div class="filter-group">
            <label for="sort">Сортировка по цене:</label>
            <select id="sort">
                <option value="none">Без сортировки</option>
                <option value="asc">По возрастанию</option>
                <option value="desc">По убыванию</option>
            </select>
        </div>
    
        <div id="products" class="grid"></div>
    </div> <!-- Закрывается shopCart -->
    
    <script src="api.js"></script>
    <script>
        console.log('Страница загружена');
        window.addEventListener('load', function() {
            console.log('Контейнер products:', document.getElementById('products'));
            console.log('Стили загружены:', document.styleSheets.length);
        });
    </script>
  </body>
</html>
