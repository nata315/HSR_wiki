<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-container">
        <div class="header-left">
          <img id="logo" src="https://static.wikia.nocookie.net/honkai-star-rail/images/e/e6/Site-logo.png/revision/latest?cb=20230218221344&path-prefix=ru" alt="Логотип">
          <a href="../index.html" class="back-button">На главную</a>
        </div>

        <div class="header-center">
          <h2 class="section-title">Магазин</h2>
        </div>

        <div class="header-right">
          <div class="empty-space"></div>
        </div>
      </div>
    </header>  

    <main class="shop-main">
      <div class = "shopCart">
          <select id="category">
            <option value="all">Все</option>
            <option value="electronics">Электроника</option>
            <option value="jewelery">Украшения</option>
            <option value="men's clothing">Мужская одежда</option>
          <option value="women's clothing">Женская одежда</option>
          </select>
          <div id="products" class="grid"></div>
      </div> 
    </main>
    

    <footer class="footer">
      <p>Контакты</p>
    </footer>

    <script src="api.js"></script>
  </body>
</html>
